  <script>
    // Register Firebase messaging service worker FIRST (before Flutter's SW)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // Register Firebase SW
        navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' })
          .then(function (registration) {
            console.log('Firebase Messaging SW registered successfully:', registration.scope);
          })
          .catch(function (error) {
            console.error('Firebase Messaging SW registration failed:', error);
          });

        // Trigger offline download for Flutter service worker
        // This ensures all app resources are cached for offline use
        navigator.serviceWorker.ready.then(function (registration) {
          if (registration.active) {
            registration.active.postMessage('downloadOffline');
            console.log('Triggered offline download for PWA');
          }
        });
      });
    }

    // Global function to request notification permission
    window.requestNotificationPermission = async function () {
      try {
        const permission = await Notification.requestPermission();
        console.log('Notification permission:', permission);
        return permission === 'granted';
      } catch (error) {
        console.error('Error requesting notification permission:', error);
        return false;
      }
    };

    // Check if notifications are supported and permission status
    window.getNotificationStatus = function () {
      if (!('Notification' in window)) {
        return 'unsupported';
      }
      return Notification.permission; // 'granted', 'denied', or 'default'
    };
  </script>

  <!-- Firebase SDK for notifications -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDiAQHwCK9dJZcr6qsFiQk92XvNy69Clv8",
      authDomain: "daily-zikr-app.firebaseapp.com",
      projectId: "daily-zikr-app",
      storageBucket: "daily-zikr-app.firebasestorage.app",
      messagingSenderId: "749174344298",
      appId: "1:749174344298:web:84c958fa71af98c2955813"
    };

    const app = initializeApp(firebaseConfig);

    // Only initialize messaging if supported
    if ('Notification' in window && 'serviceWorker' in navigator) {
      const messaging = getMessaging(app);

      // Make available globally for Flutter
      window.firebaseMessaging = messaging;

      // Function to get FCM token after permission is granted
      window.getFirebaseToken = async function () {
        try {
          // First ensure we have permission
          if (Notification.permission !== 'granted') {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
              console.log('Notification permission not granted');
              return null;
            }
          }

          // Wait for service worker to be ready
          const registration = await navigator.serviceWorker.ready;

          // Get token - Note: You need to add your VAPID key from Firebase Console
          // Go to: Firebase Console > Project Settings > Cloud Messaging > Web Push certificates
          const token = await getToken(messaging, {
            serviceWorkerRegistration: registration
            // vapidKey: 'YOUR_VAPID_KEY_HERE' // Get this from Firebase Console
          });

          console.log('FCM Token obtained:', token);

          // You can send this token to your server to send targeted notifications
          // For now, we log it so you can test with Firebase Console
          if (token) {
            console.log('=== FCM TOKEN (use this in Firebase Console to test) ===');
            console.log(token);
            console.log('=========================================================');
          }

          return token;
        } catch (error) {
          console.error('Error getting FCM token:', error);
          return null;
        }
      };

      // Handle foreground messages
      onMessage(messaging, (payload) => {
        console.log('Foreground message received:', payload);

        // Show notification even when app is in foreground
        if (Notification.permission === 'granted') {
          const notificationTitle = payload.notification?.title || 'Daily Zikr';
          const notificationOptions = {
            body: payload.notification?.body || 'Time for your adhkar!',
            icon: '/icons/Icon-192.png',
            badge: '/icons/Icon-192.png',
            tag: 'daily-zikr-foreground',
            requireInteraction: false
          };

          new Notification(notificationTitle, notificationOptions);
        }
      });

      // Auto-request token when page loads (if permission already granted)
      window.addEventListener('load', async function () {
        if (Notification.permission === 'granted') {
          // Small delay to ensure service worker is registered
          setTimeout(async () => {
            await window.getFirebaseToken();
          }, 2000);
        }
      });
    }
  </script>
